<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aeropuerto de Tijuana · Visor 3D (Cesium)</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: "Inter", "Segoe UI", system-ui, sans-serif; color: #0f1a2e; }
  #cesiumContainer { position: absolute; inset: 0; }

  .toolbar {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; gap: 10px; z-index: 5;
    pointer-events: none; flex-wrap: wrap;
  }
  .toolbar .group { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; }
  .btn {
    background: rgba(15, 26, 46, .85); color: #e8efff;
    border: 1px solid rgba(255,255,255,.16); padding: 8px 12px; border-radius: 8px;
    font-size: 12.5px; font-weight: 600; cursor: pointer; backdrop-filter: blur(6px);
    font-family: inherit; transition: all .15s ease;
  }
  .btn:hover { background: rgba(11, 108, 247, .85); border-color: #06b6d4; }
  .btn.active { background: #0b6cf7; border-color: #06b6d4; }

  .legend {
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(15,26,46,.88); color: #cbd5e1;
    border: 1px solid rgba(255,255,255,.16);
    padding: 12px 14px; border-radius: 10px; font-size: 12px; line-height: 1.5;
    max-width: 280px; backdrop-filter: blur(6px); z-index: 5;
  }
  .legend b { color: #fff; }

  .loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #05122a, #0b1530); color: #cbd5e1;
    font-weight: 600; z-index: 4; font-size: 14px;
  }
  .loading .ring {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid rgba(6,182,212,.25); border-top-color: #06b6d4;
    animation: spin 1s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="cesiumContainer"></div>

<div class="toolbar">
  <div class="group">
    <button class="btn" id="btn-flyto">✈ Aeródromo</button>
    <button class="btn" id="btn-runway">🛬 Pista 09/27</button>
    <button class="btn" id="btn-top">⬛ Cenital</button>
    <button class="btn" id="btn-tilt">🧭 Oblicua</button>
  </div>
  <div class="group">
    <select class="btn" id="basemap">
      <option value="osm">🗺 OSM</option>
      <option value="satellite">🛰 Esri Satellite</option>
      <option value="google">🌐 Google Hybrid</option>
    </select>
    <button class="btn active" id="btn-measure">📏 Medir</button>
  </div>
</div>

<div class="legend">
  <div><b>📍 Aeropuerto de Tijuana</b></div>
  <div>32°32′27″N · 116°58′12″O · 149 m AMSL</div>
  <div style="margin-top:6px;opacity:.85;">📏 Click para medir · Click derecho resetea</div>
</div>

<div class="loading" id="loading"><div class="ring"></div>Cargando CesiumJS…</div>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
<script src="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Cesium.js"></script>
<script>
(async function () {
  Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2NDNjMzAxMS05NGVjLTQ1ZTktYjhjMy1lNDI3NjAwMDJhMjkiLCJpZCI6MTMyMTU4LCJpYXQiOjE2OTA1ODYzMTR9.6r-lijvfml1thVTi8KOI1DnP5vm_5OVjlK-ZKhpFEbI";

  const viewer = new Cesium.Viewer("cesiumContainer", {
    baseLayerPicker: false, geocoder: false, homeButton: false,
    sceneModePicker: false, navigationHelpButton: false, timeline: false,
    animation: false, fullscreenButton: false, selectionIndicator: false, infoBox: false,
    baseLayer: Cesium.ImageryLayer.fromProviderAsync(Cesium.IonImageryProvider.fromAssetId(3)),
    terrain: Cesium.Terrain.fromWorldTerrain(),
  });

  const TIJ = { lon: -116.97, lat: 32.5408 };

  // Vista inicial — oblicua sobre el aeropuerto
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(TIJ.lon, TIJ.lat - 0.025, 5500),
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-55), roll: 0 }
  });

  // Cargar asset Cesium Ion
  try {
    const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(5013762);
    viewer.scene.primitives.add(tileset);
    await viewer.zoomTo(tileset);
    console.log("[Cesium] tileset cargado");
  } catch (err) { console.warn("[Cesium] asset 5013762 no disponible:", err); }

  // Basemaps
  function setBase(kind) {
    viewer.imageryLayers.removeAll();
    if (kind === "satellite") {
      viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
        url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        maximumLevel: 19
      }));
    } else if (kind === "google") {
      viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
        url: "https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}", maximumLevel: 20
      }));
    } else {
      viewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({
        url: "https://tile.openstreetmap.org/"
      }));
    }
  }
  document.getElementById("basemap").addEventListener("change", e => setBase(e.target.value));

  // Cámaras predefinidas
  const fly = (dest, heading, pitch, h = 2000) => viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(dest[0], dest[1], h),
    orientation: { heading: Cesium.Math.toRadians(heading), pitch: Cesium.Math.toRadians(pitch), roll: 0 },
    duration: 1.8
  });
  document.getElementById("btn-flyto").onclick = () => fly([TIJ.lon, TIJ.lat - 0.025], 0, -55, 5500);
  document.getElementById("btn-runway").onclick = () => fly([TIJ.lon, TIJ.lat - 0.012], 89, -30, 1200);
  document.getElementById("btn-top").onclick = () => fly([TIJ.lon, TIJ.lat], 0, -89, 9000);
  document.getElementById("btn-tilt").onclick = () => fly([TIJ.lon + 0.04, TIJ.lat - 0.04], -45, -45, 3500);

  // Medición
  let measuring = true;
  const btnMeasure = document.getElementById("btn-measure");
  const positions = [];
  const labels = [];
  let total = 0;
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  viewer.entities.add({
    polyline: { positions: new Cesium.CallbackProperty(() => positions, false),
      width: 2, material: Cesium.Color.CYAN }
  });

  function placePoint(c) {
    positions.push(c);
    viewer.entities.add({ position: c, point: { pixelSize: 12, color: Cesium.Color.CYAN, outlineColor: Cesium.Color.WHITE, outlineWidth: 2 } });
    if (positions.length >= 2) {
      total = 0;
      for (let i = 1; i < positions.length; i++) total += Cesium.Cartesian3.distance(positions[i-1], positions[i]);
      labels.push(viewer.entities.add({
        position: positions[positions.length - 1],
        label: {
          text: `${(total / 1000).toFixed(3)} km`,
          font: "600 13px Inter, sans-serif", fillColor: Cesium.Color.WHITE,
          outlineColor: Cesium.Color.BLACK, outlineWidth: 3,
          showBackground: true, backgroundColor: new Cesium.Color(0, 0.5, 0.85, 0.7),
          pixelOffset: new Cesium.Cartesian2(14, -14)
        }
      }));
    }
  }

  handler.setInputAction((click) => {
    if (!measuring) return;
    const c = viewer.scene.pickPosition(click.position);
    if (Cesium.defined(c)) placePoint(c);
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
  handler.setInputAction(() => {
    positions.length = 0; total = 0;
    labels.forEach(l => viewer.entities.remove(l)); labels.length = 0;
  }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

  btnMeasure.onclick = () => {
    measuring = !measuring;
    btnMeasure.classList.toggle("active", measuring);
    btnMeasure.textContent = measuring ? "📏 Medir (activo)" : "📏 Medir (pausado)";
  };

  // Listo
  document.getElementById("loading").style.display = "none";
})();
</script>
</body>
</html>
